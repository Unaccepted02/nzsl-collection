    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 2rem 2rem 1.5rem;
    }
    header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
    header p  { font-size: 0.95rem; color: #aab; }

    main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    section { margin-bottom: 3rem; }
    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #1a1a2e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    .card video {
      width: 100%;
      display: block;
      background: #000;
    }
    .card .label {
      padding: 0.6rem 0.8rem 0.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    /* Upload area */
    .upload-section {
      padding: 0.5rem 0.8rem 0.75rem;
      border-top: 1px solid #f0f0f0;
      margin-top: auto;
    }
    .upload-section form {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .file-input { display: none; }
    .file-label {
      font-size: 0.76rem;
      padding: 0.28rem 0.55rem;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-label:hover { background: #e4e4e4; }
    .upload-btn {
      font-size: 0.76rem;
      padding: 0.28rem 0.65rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .upload-btn:hover:not(:disabled) { background: #2d2d50; }
    .upload-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .upload-status {
      font-size: 0.73rem;
      margin-top: 0.25rem;
      min-height: 1em;
    }
    .upload-status.success { color: #1a6640; }
    .upload-status.error   { color: #b33; }
    .upload-status.loading { color: #555; }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      margin-left: 0.4rem;
      vertical-align: middle;
      font-weight: 500;
    }
    .badge-nz  { background: #d0f0e0; color: #1a6640; }
    .badge-ref { background: #dde8ff; color: #1a3a8f; }

<script>
  // Make each file-label open the hidden file input
  document.querySelectorAll('.upload-section').forEach(section => {
    const input  = section.querySelector('.file-input');
    const label  = section.querySelector('.file-label');
    const status = section.querySelector('.upload-status');

    label.addEventListener('click', () => input.click());

    input.addEventListener('change', () => {
      label.textContent = input.files[0] ? input.files[0].name : 'Choose video';
      status.textContent = '';
      status.className = 'upload-status';
    });
  });

  function handleSubmit(form) {
    const section = form.closest('.upload-section');
    const input   = form.querySelector('.file-input');
    const label   = form.querySelector('.file-label');
    const btn     = form.querySelector('.upload-btn');
    const status  = section.querySelector('.upload-status');
    const file    = input.files[0];

    if (!file) {
      status.textContent = 'Please choose a video file first.';
      status.className = 'upload-status error';
      return false;
    }

    if (file.size > 10 * 1024 * 1024) {
      status.textContent = 'File too large (max 10 MB).';
      status.className = 'upload-status error';
      return false;
    }

    btn.disabled = true;
    status.textContent = 'Sending…';
    status.className = 'upload-status loading';

    // Detect completion via the hidden iframe's load event
    const frame = document.querySelector(`iframe[name="${form.target}"]`);
    const onLoad = () => {
      status.textContent = '✓ Sent! Check your email.';
      status.className = 'upload-status success';
      input.value = '';
      label.textContent = 'Choose video';
      btn.disabled = false;
      frame.removeEventListener('load', onLoad);
    };
    frame.addEventListener('load', onLoad);

    return true; // allow the form to submit
  }
</script>
